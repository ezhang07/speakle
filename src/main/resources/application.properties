spring.application.name=speakle
spring.datasource.url=jdbc:postgresql://localhost:5432/speakle
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:password}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Path to the ffmpeg binary (override if it's not on PATH)
ffmpeg.path=ffmpeg

# Local faster-whisper transcription (runs scripts/transcribe.py as a subprocess).
# Point whisper.python at the venv interpreter so it has faster-whisper installed.
whisper.python=.venv/Scripts/python.exe
whisper.script=scripts/transcribe.py

# Video uploads are large; bump the multipart limits off the 1MB default
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB